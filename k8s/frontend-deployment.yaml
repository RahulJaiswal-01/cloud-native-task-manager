apiVersion: apps/v1
kind: Deployment

metadata:
  name: frontend
  namespace: cloudnative

spec:
  replicas: 1

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
      - name: frontend

        image: docker.io/library/cloudnative-frontend:latest
        imagePullPolicy: IfNotPresent

        ports:
        - containerPort: 5173
